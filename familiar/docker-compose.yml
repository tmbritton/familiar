# Familiar — Docker Compose
#
# Usage:
#   docker compose up -d           # start the daemon
#   docker compose exec fam fam chat   # run commands
#   docker compose down            # stop
#
# Create a .env file with your API key:
#   FAMILIAR_API_KEY=sk-xxx
#   FAMILIAR_BASE_URL=https://api.deepseek.com
#   FAMILIAR_CHAT_MODEL=deepseek-chat

services:
  fam:
    build: .
    volumes:
      - ${FAM_PROJECT_DIR:-.}:/project
    environment:
      - FAMILIAR_PROVIDER=${FAMILIAR_PROVIDER:-openai_compatible}
      - FAMILIAR_API_KEY=${FAMILIAR_API_KEY}
      - FAMILIAR_BASE_URL=${FAMILIAR_BASE_URL:-https://api.deepseek.com}
      - FAMILIAR_CHAT_MODEL=${FAMILIAR_CHAT_MODEL:-deepseek-chat}
      - FAMILIAR_PROJECT_DIR=/project
    stdin_open: true
    tty: true
    restart: unless-stopped
